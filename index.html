<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>POSレジ</title>
<meta name="theme-color" content="#1f6feb">
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="app-header">
<h1>POSレジシステム</h1>
<div class="header-actions">
<button id="installBtn" hidden>インストール</button>
<button id="exportBtn">CSV出力</button>
</div>
</header>
<main class="layout">
<section class="panel products-panel">
<div class="panel-head">
<h2>商品登録</h2>
<button id="loadSampleBtn" type="button">サンプル読込</button>
</div>
<form id="productForm" class="product-form">
<input id="productName" type="text" placeholder="商品名" required>
<input id="productPrice" type="number" placeholder="価格" min="0" step="1" required>
<button type="submit">追加</button>
</form>
<div class="panel-subhead">
<h3>商品一覧</h3>
</div>
<div id="products" class="products"></div>
</section>
<section class="panel cart-panel">
<div class="panel-head">
<h2>会計</h2>
<button id="clearCartBtn" type="button" class="danger">カートクリア</button>
</div>
<div id="cart" class="cart-list"></div>
<div class="summary">
<div class="summary-row">
<span>合計</span>
<strong id="totalAmount">¥0</strong>
</div>
<div class="summary-row pay-row">
<label for="receivedAmount">預かり金</label>
<input id="receivedAmount" type="number" min="0" step="1" placeholder="0">
</div>
<div class="summary-row">
<span>おつり</span>
<strong id="changeAmount">¥0</strong>
</div>
</div>
<button id="checkoutBtn" type="button" class="primary large">会計完了</button>
</section>
<section class="panel history-panel">
<div class="panel-head">
<h2>履歴</h2>
<button id="refreshHistoryBtn" type="button">更新</button>
</div>
<div id="history" class="history-list"></div>
</section>
</main>
<template id="productCardTemplate">
<button class="product-card" type="button">
<span class="product-name"></span>
<span class="product-price"></span>
</button>
</template>
<template id="cartItemTemplate">
<div class="cart-item">
<div class="cart-info">
<div class="cart-name"></div>
<div class="cart-sub"></div>
</div>
<div class="cart-actions">
<button class="qty-minus" type="button">−</button>
<span class="cart-qty">1</span>
<button class="qty-plus" type="button">＋</button>
<button class="remove-btn danger" type="button">削除</button>
</div>
</div>
</template>
<template id="historyItemTemplate">
<div class="history-item">
<div class="history-top">
<strong class="history-id"></strong>
<span class="history-time"></span>
</div>
<div class="history-body"></div>
<div class="history-total"></div>
</div>
</template>
<script src="app.js"></script>
</body>
</html>
